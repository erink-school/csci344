resources:
  - type: Computer
    path: /api/computers
    operations: [list, retrieve, create, update, delete]
    fields:
      - name: name
        type: string
        required: true
        query: true
      - name: brand
        type: Brand
        query: true
      - name: price
        type: number
        required: true
        query: true
      - name: photo
        type: image_url
        required: true
      - name: category
        type: string
        query: true
      - name: ram
        type: integer
        query: true
      - name: storage
        type: integer
        query: true
      - name: processor
        type: string
        query: true
      - name: is_available
        type: boolean
        query: true
      - name: description
        type: text
    permissions:
      list: public
      retrieve: public
      create: user
      update: owner
      delete: owner

  - type: Brand
    path: /api/brands
    operations: [list, retrieve, create, update, delete]
    fields:
      - name: name
        type: string
        required: true
      - name: description
        type: text
    permissions:
      list: public
      retrieve: public
      create: user
      update: owner
      delete: owner

  - type: Wishlist
    path: /api/wishlist
    operations: [list, retrieve, create, update, delete]
    fields:
      - name: note
        type: string
      - name: computer
        type: Computer
        required: true
        query: true
    permissions:
      list: owner
      retrieve: owner
      create: user
      update: owner
      delete: owner

  - type: Reservation
    path: /api/reservations
    operations: [list, retrieve, create, update, delete]
    fields:
      - name: customer_name
        type: string
        required: true
      - name: email
        type: string
        required: true
      - name: phone
        type: string
      - name: status
        type: string
        required: true
        query: true
      - name: pickup_date
        type: datetime
      - name: notes
        type: text
      - name: computer
        type: Computer
        required: true
        query: true
    permissions:
      list: owner
      retrieve: owner
      create: user
      update: owner
      delete: owner